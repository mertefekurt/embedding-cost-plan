<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Embedding Cost Plan cover">

  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" stop-opacity=".34"/>
      <stop offset=".54" stop-color="#101014" stop-opacity="0"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity=".30"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" seed="57" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .10"/></feComponentTransfer>
      <feBlend mode="soft-light" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="30" fill="#101014"/>
  <rect width="1280" height="420" rx="30" fill="url(#g)" filter="url(#grain)"/>

  <circle cx="1044" cy="182" r="178" fill="#f59e0b" opacity=".14"/>
  <circle cx="1138" cy="286" r="92" fill="#ef4444" opacity=".18"/>
  <rect x="86" y="86" width="560" height="248" rx="26" fill="#101014" opacity=".68" stroke="#f59e0b" stroke-width="4"/>
  <text x="124" y="178" fill="#fafafa" font-family="IBM Plex Sans, ui-sans-serif, system-ui" font-size="60" font-weight="850">Embedding Cost Plan</text>
  <text x="128" y="234" fill="#d6d3d1" font-family="IBM Plex Sans, ui-sans-serif, system-ui" font-size="23">Estimate embedding job notes for batch size, retry,...</text>
  <text x="128" y="292" fill="#ef4444" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="800">MODEL EVALUATION</text>
  <rect x="846" y="122" width="152" height="28" rx="8" fill="#f59e0b" opacity=".85"/>
