  <rect x="846" y="176" width="224" height="28" rx="8" fill="#ef4444" opacity=".85"/>
  <text x="862" y="195" fill="#fafafa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">missing-cost-cap</text>
